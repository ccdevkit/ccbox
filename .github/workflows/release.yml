# CI/CD: build, Docker push, GitHub Release, npm publish (FR-026, T055)
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write # OIDC for npm trusted publishing

env:
  REGISTRY: ghcr.io
  DOCKER_IMAGE: ghcr.io/ccdevkit/ccbox-base

jobs:
  # ---------------------------------------------------------------------------
  # Build Go binaries for all 6 platform/arch combos
  # ---------------------------------------------------------------------------
  build:
    strategy:
      matrix:
        include:
          # Native builds (CGO_ENABLED=1)
          - os: macos-14          # ARM64 runner
            goos: darwin
            goarch: arm64
            cgo: "1"
          - os: macos-13          # AMD64 runner
            goos: darwin
            goarch: amd64
            cgo: "1"
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo: "1"
          - os: windows-latest
            goos: windows
            goarch: amd64
            cgo: "1"
          # Cross-compiled builds (CGO_ENABLED=0, no clipboard support)
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cgo: "0"
          - os: ubuntu-latest
            goos: windows
            goarch: arm64
            cgo: "0"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Linux native builds require libx11-dev for CGO clipboard (I22)
      - name: Install libx11-dev
        if: matrix.goos == 'linux' && matrix.cgo == '1'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev

      - name: Build ccbox binary
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi

          go build \
            -trimpath \
            -ldflags "-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o "ccbox-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            ./cmd/ccbox/
        shell: bash

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccbox-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ccbox-*
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Docker multi-arch build and push to ghcr.io
  # ---------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Create GitHub Release with all binaries
  # ---------------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [build, docker]

    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  # ---------------------------------------------------------------------------
  # Publish npm package with OIDC provenance attestation
  # Uses --provenance for OIDC supply-chain attestation (requires id-token: write).
  # NPM_TOKEN secret is still required for publish auth until npm supports full
  # trusted-publisher OIDC (like PyPI). Configure as a granular automation token.
  # ---------------------------------------------------------------------------
  npm:
    runs-on: ubuntu-latest
    needs: [release]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Set package version from tag
        working-directory: npm
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        working-directory: npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
